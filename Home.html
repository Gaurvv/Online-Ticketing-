<style>
  :root{
    --forest-dark:#00853C;
    --forest:#00853C;
    --forest-light:#5b8a5a;
    --sand:#f4f1e8;
    --gold:#c8973a;
    --text-dark:#1f2a22;
    --muted:#6b7568;
  }
  *{box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:var(--sand);
    color:var(--text-dark);
    margin:0;

    padding-top:88px;   /* same as iframe height */
}
  h1,h2,h3,.brand{font-family:'Playfair Display',serif;}

  /* Navbar */
  .navbar-custom{
    background:var(--forest-dark);
    padding:21px 0;
}
  .navbar-custom .brand{
    color:#fff;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:.5px;
  }
  .navbar-custom .brand i{color:var(--gold); margin-right:8px;}
  .navbar-custom .nav-link{
    color:#e6e6e0 !important;
    font-weight:500;
    margin:0 6px;
  }
  .navbar-custom .nav-link:hover{color:var(--gold) !important;}

  /* Hero */
  .hero{
    position:relative;
    height:65vh;
    min-height:420px;
    background:
      linear-gradient(180deg, rgba(15,30,18,.35) 0%, rgba(15,30,18,.75) 100%),
      url('https://images.openai.com/static-rsc-4/3XlTH6ZE9plp3Rw5yh39_TrrQ6Ph3216jCgt2e7sT2y7fMbIq1Q86Ni4Y7Iaewd45H7Xlw_xpfjpUkr4wQCdam9R6vRZqPN24Cw5AAO36QIzAG3OTcC-FFCVos24VYCiEkGiX9mksUahQI3afTE0fgC2dhfq2SmfGuHKgeUY8V87gxUorTybigpx8jLMEJJQ?purpose=fullsize') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#fff;
  }
  .hero h1{
    font-size:3.2rem;
    font-weight:800;
    text-shadow:0 4px 18px rgba(0,0,0,.4);
  }
  .hero p{
    font-size:1.15rem;
    max-width:640px;
    margin:14px auto 28px;
    color:#eef0e8;
  }
  .btn-gold{
    background:var(--gold);
    border:none;
    color:#fff;
    padding:12px 30px;
    font-weight:600;
    border-radius:30px;
    transition:.25s;
  }
  .btn-gold:hover{background:#b3812f; color:#fff; transform:translateY(-2px);}

  /* Section heading */
  .section-title{
    font-weight:700;
    color:var(--forest-dark);
    margin-bottom:6px;
  }
  .section-sub{
    color:var(--muted);
    margin-bottom:36px;
  }

  /* Park Card */
  .park-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(28,56,41,.08);
    transition:transform .3s ease, box-shadow .3s ease;
    height:100%;
    border:1px solid #ece9dd;
  }
  .park-card:hover{
    transform:translateY(-8px);
    box-shadow:0 16px 34px rgba(83, 176, 126, 0.18);
  }
  .park-img-wrap{
    position:relative;
    height:200px;
    overflow:hidden;
  }
  .park-img-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .5s ease;
  }
  .park-card:hover .park-img-wrap img{transform:scale(1.08);}
  .park-badge{
    position:absolute;
    top:14px;
    left:14px;
    background:rgba(72, 255, 157, 0.85);
    color:#fff;
    padding:5px 14px;
    border-radius:20px;
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.3px;
  }
  .park-fav{
    position:absolute;
    top:14px;
    right:14px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:rgba(255,255,255,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
    border:none;
  }
  .park-fav i{color:var(--muted); font-size:1rem;}
  .park-fav.active i{color:#e0563e;}
  .park-fav:hover{background:#fff;}
  .park-body{padding:18px 18px 20px;}
  .park-title{
    font-weight:700;
    font-size:1.05rem;
    margin-bottom:4px;
    color:var(--text-dark);
  }
  .park-loc{
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:10px;
  }
  .park-loc i{color:var(--forest-light); margin-right:5px;}
  .park-desc{
    font-size:.88rem;
    color:#4f5750;
    margin-bottom:14px;
    min-height:62px;
  }
  .park-meta{
   
    justify-content:space-between;
    align-items:center;
    border-top:1px solid #efece0;
    padding-top:14px;
    
  }
  .park-rating{
    color:var(--gold);
    font-weight:600;
    font-size:.9rem;
  }
  .park-rating i{margin-right:3px;}
  .btn-explore{
    background:transparent;
    border:1.5px solid var(--forest );
    color:var(--forest);
    font-weight:600;
    font-size:.82rem;
    padding:7px 16px;
    border-radius:24px;
    transition:.2s;
    text-decoration:none;
    display:inline-block;
  }
  .btn-explore:hover{background:var(--forest); color:#fff;}

  /* Stats */
  .stats-section{
    background:var(--forest-dark);
    color:#fff;
    padding:60px 0;
    margin-top:80px;
  }
  .stat-num{
    font-size:2.6rem;
    font-weight:800;
    color:var(--gold);
    font-family:'Playfair Display',serif;
  }
  .stat-label{color:#cdd6c8; font-size:.95rem;}

footer{
    background:#00853C;
    color:#aab4a4;
    padding:60px 0 18px;
    margin-top:60px;
    font-size:.9rem;
}
  footer a{color:#cdd6c8; text-decoration:none;}
  footer a:hover{color:var(--gold);}
  .footer-brand{color:#fff; font-weight:700; font-family:'Playfair Display',serif; font-size:1.3rem;}

  @media (max-width:767px){
    .hero h1{font-size:2.1rem;}
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
// Only 4 national parks, 4 per row (col-lg-3)
const parks = [
  {
    id:"Shivapuri.html", 
    name:"Shivapuri Nagarjun National Park",   
    location:"Kathmandu Valley",
    desc:"A protected area known for lush forests, wildlife, hiking trails.", 
    img:"https://www.nomadadventuretreks.com/wp-content/uploads/2025/08/Bardia-National-Park-Tour.webp"},
  {
    id:"ChitwanPark.html",
     name:"Chitwan National Park", 
     location:"Chitwan district.",
       desc:"A protected area famous for wildlife, jungle safaris, and one-horned rhinoceroses.", 
       img:"https://images.openai.com/static-rsc-4/3XlTH6ZE9plp3Rw5yh39_TrrQ6Ph3216jCgt2e7sT2y7fMbIq1Q86Ni4Y7Iaewd45H7Xlw_xpfjpUkr4wQCdam9R6vRZqPN24Cw5AAO36QIzAG3OTcC-FFCVos24VYCiEkGiX9mksUahQI3afTE0fgC2dhfq2SmfGuHKgeUY8V87gxUorTybigpx8jLMEJJQ?purpose=fullsize"},
  {
    id:"Banke.html",
     name:"Banke National Park", 
     location:"Khairi, Banke District",
     desc:"A protected area known for Bengal tigers, elephants, dense forests, and diverse wildlife.", 
     img:"https://images.openai.com/static-rsc-4/b0rwlx0dU1_6MEnzY8YnhHiOnfNKhhkPJsxEmaD9ddRexSbRxyWoeqz5b9N_2A01ukATeJao5fdQYyDNd2AMQiPbXzMR_EX0MpnYyIKG_ZcqJGT6DbZi4C0uRtinYNcjexRy_J42YtqFluCRU-ZjrJCRSbEiOQLJEzNLAlKVXQ4jN0IqsrkR-IQUSHQznVDC?purpose=fullsize"},
  {
    id:"Langtang.html",
     name:"Langtang National Park",
      location:"Dhunche, Rasuwa District", 
       desc:"A protected area known for Himalayan landscapes, glaciers, alpine forests, and rare wildlife.",
        img:"https://images.openai.com/static-rsc-4/1gdBCrzhMFpKlpgiSzugjRieU1gWbqsV9PmJSF4_GfA5xFg0jysJfHOty268Wsu0TZQ2zwEdm4_ESfXT-TKw-4UwuvsGItaXhEDQwavjbSlPIpFX91GONFM9r_YoP4Hu-wIUB--znEZ3Pi0s4tjZt6I6v2hibq5GLQ8HhyAxiNLGnM-yYhU2NQaQsnnFvzhB?purpose=fullsize"}
];

const container = document.getElementById('parkContainer');

container.innerHTML = parks.map(park => `
  <div class="col-lg-3 col-md-6">
    <div class="park-card">
      <div class="park-img-wrap">
        <img src="${park.img}" alt="${park.name}" loading="lazy">
        
       
      </div>
      <div class="park-body">
        <div class="park-title">${park.name}</div>
        <div class="park-loc"><i class="fa-solid fa-location-dot"></i>${park.location}</div>
      <!--  <div class="park-desc">${park.desc}</div> --> 
     <div class="park-meta d-flex justify-content-center">
    <a class="btn btn-explore" href="${park.id}">View Details</a>
</div>
      </div>
    </div>
  </div>
`).join('');

document.querySelectorAll('.park-fav').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    btn.classList.toggle('active');
  });
});

// Animated stat counters
const statEls = document.querySelectorAll('.stat-num');
let counted = false;
function animateStats(){
  if(counted) return;
  const statsSection = document.getElementById('stats');
  const rect = statsSection.getBoundingClientRect();
  if(rect.top < window.innerHeight - 100){
    counted = true;
    statEls.forEach(el => {
      const target = +el.dataset.count;
      let current = 0;
      const step = Math.max(1, Math.ceil(target/60));
      const timer = setInterval(() => {
        current += step;
        if(current >= target){ current = target; clearInterval(timer); }
        el.textContent = current.toLocaleString();
      }, 20);
    });
  }
}
window.addEventListener('scroll', animateStats);
animateStats();
</script>
