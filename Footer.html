<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --gold:#c8973a;
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            margin:0;
            font-family:'Inter',sans-serif;
            background:#00853C;
        }

        footer{
            background:#00853C;
            color:#aab4a4;
            padding:30px 0 18px;
            font-size:.9rem;
        }

        footer a{
            color:#cdd6c8;
            text-decoration:none;
        }

        footer a:hover{
            color:var(--gold);
        }

        .footer-brand{
            color:#fff;
            font-weight:700;
            font-family:'Playfair Display',serif;
            font-size:1.3rem;
        }
    </style>
</head>

<body>

<footer>
    <div class="container">
        <hr style="border-color:#2a3a2c; margin:0 0 16px;">
        <div class="text-center">
            &copy; 2026 ParkScape. All rights reserved.
        </div>
    </div>
</footer>

</body>
</html>
